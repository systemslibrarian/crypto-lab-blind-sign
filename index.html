<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <script>
      (function () {
        const saved = localStorage.getItem('theme');
        document.documentElement.setAttribute(
          'data-theme', saved ?? 'dark'
        );
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Interactive blind signature lab covering Chaum e-cash, anonymous credentials, and private voting."
    />
    <title>Crypto Lab: Blind Signatures</title>
  </head>
  <body>
    <header class="site-header" style="position: relative;">
      <button
        id="theme-toggle"
        class="theme-toggle"
        aria-label="Switch to light mode"
        style="position: absolute; top: 0; right: 0"
      >🌙</button>
      <div>
        <p class="category-chip">Privacy Cryptography</p>
        <h1>Blind Signature Lab</h1>
        <p class="subtitle">Interactive exhibits for blind signatures, e-cash, anonymous credentials, and private voting.</p>
      </div>
    </header>

    <nav class="panel-nav" aria-label="Exhibit navigation">
      <button class="tab-btn active" data-panel="protocol">The Protocol</button>
      <button class="tab-btn" data-panel="cash">Chaum's E-Cash</button>
      <button class="tab-btn" data-panel="voting">Anonymous Voting</button>
      <button class="tab-btn" data-panel="credentials">Anonymous Credentials</button>
      <button class="tab-btn" data-panel="compare">RSA vs EC Blind</button>
    </nav>

    <main>
      <section id="protocol" class="panel active"></section>
      <section id="cash" class="panel"></section>
      <section id="voting" class="panel"></section>
      <section id="credentials" class="panel"></section>
      <section id="compare" class="panel"></section>
    </main>

    <footer class="site-footer">
      <p>So whether you eat or drink or whatever you do, do it all for the glory of God. - 1 Corinthians 10:31</p>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <script>
      (function () {
        const saved = localStorage.getItem('theme');
        document.documentElement.setAttribute(
          'data-theme', saved ?? 'dark'
        );
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Interactive blind signature lab covering Chaum e-cash, anonymous credentials, and private voting."
    />
    <title>Crypto Lab: Blind Signatures</title>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div id="aria-live-polite" class="sr-only" aria-live="polite" aria-atomic="true"></div>
    <div id="aria-live-assertive" class="sr-only" aria-live="assertive" aria-atomic="true"></div>

    <header class="site-header" role="banner" style="position: relative;">
      <button
        id="theme-toggle"
        class="theme-toggle"
        aria-label="Switch to light mode"
        title="Toggle color theme"
        style="position: absolute; top: 0; right: 0"
      ><span id="theme-icon" aria-hidden="true">🌙</span></button>
      <div class="header-inner">
        <div class="header-meta">
          <span class="category-chip" aria-label="Category: Privacy Cryptography">Privacy Cryptography</span>
        </div>
        <h1 class="site-title">Blind Signature Lab</h1>
        <p class="subtitle">Interactive exhibits for blind signatures, e-cash, anonymous credentials, and private voting.</p>
      </div>
    </header>

    <nav class="panel-nav" aria-label="Exhibit navigation">
      <div class="tab-list" role="tablist" aria-label="Blind signature exhibits">
        <button class="tab-btn active" role="tab" id="tab-protocol" aria-selected="true" aria-controls="protocol" data-panel="protocol">The Protocol</button>
        <button class="tab-btn" role="tab" id="tab-cash" aria-selected="false" aria-controls="cash" data-panel="cash" tabindex="-1">Chaum's E-Cash</button>
        <button class="tab-btn" role="tab" id="tab-voting" aria-selected="false" aria-controls="voting" data-panel="voting" tabindex="-1">Anonymous Voting</button>
        <button class="tab-btn" role="tab" id="tab-credentials" aria-selected="false" aria-controls="credentials" data-panel="credentials" tabindex="-1">Anonymous Credentials</button>
        <button class="tab-btn" role="tab" id="tab-compare" aria-selected="false" aria-controls="compare" data-panel="compare" tabindex="-1">RSA vs EC Blind</button>
      </div>
    </nav>

    <main id="main-content">
      <section id="protocol" class="panel active" role="tabpanel" aria-labelledby="tab-protocol" tabindex="0"></section>
      <section id="cash" class="panel" role="tabpanel" aria-labelledby="tab-cash" tabindex="0"></section>
      <section id="voting" class="panel" role="tabpanel" aria-labelledby="tab-voting" tabindex="0"></section>
      <section id="credentials" class="panel" role="tabpanel" aria-labelledby="tab-credentials" tabindex="0"></section>
      <section id="compare" class="panel" role="tabpanel" aria-labelledby="tab-compare" tabindex="0"></section>
    </main>

    <footer class="site-footer" role="contentinfo">
      <p>So whether you eat or drink or whatever you do, do it all for the glory of God. &mdash; 1 Corinthians 10:31</p>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
